services:
  - type: web
    name: tg-optimization-bot
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DB_PATH
        value: data/bot.sqlite3
      - key: ASSETS_DIR
        value: data/assets
      - key: ENABLE_TELEGRAM_STARS
        value: "true"
